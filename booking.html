<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Sewa bus pariwisata Makara untuk wisata, study tour, ziarah, dan perjalanan rombongan. Armada premium, driver profesional, dan harga kompetitif. Booking mudah via WhatsApp." />
        <meta property="og:title" content="Sewa Bus Pariwisata Makara" />
        <meta
            property="og:description"
            content="Armada bus premium untuk wisata, study tour, ziarah, dan perjalanan rombongan. Booking cepat via WhatsApp." />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="https://makarabus.com/image/makara.png" />
        <title>Sewa Bus Pariwisata Makara | Bus Wisata, Study Tour & Ziarah</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
            rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet" />
        <link rel="stylesheet" href="css/style.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    </head>

    <body>
        <div id="navbar"></div>

        <section class="py-5 bg-dark text-white" id="formbooking">
            <div class="container">
                <div class="row g-4">
                    <div class="col-md-6 justify-content-center d-flex flex-column">
                        <h1 class="fw-bold">
                            Booking Armada <br />
                            <h1 class="text-info">Sekarang!</h1>
                        </h1>
                        <p class="text-white">Isi form berikut, tim kami akan langsung proses booking Anda</p>
                    </div>
                    <div class="col-md-6">
                        <form
                            id="bookingForms"
                            class="row g-3 mt-3 p-4 rounded-4 shadow"
                            style="background: #161a20; border-color: #2a2f36; color: #e6e6e6">
                            <div class="col-md-6">
                                <label class="form-label">Jenis Armada</label><span class="text-danger">*</span>
                                <select
                                    id="armada"
                                    class="form-select"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6">
                                    <option>-Pilih Jenis Armada-</option>
                                    <option>Medium 35 Seats</option>
                                    <option>Bigbus 30 Seats Leg Rest</option>
                                    <option>Bigbus 35 Seats Toilet & Smoking Area</option>
                                    <option>Bigbus 30 Seats</option>
                                    <option>Bigbus 59 Seats</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Jenis Perjalanan</label><span class="text-danger">*</span>
                                <select
                                    id="jenis_perjalanan"
                                    class="form-select"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6">
                                    <option>-Pilih Jenis Perjalanan-</option>
                                    <option>Wisata Bersama (KKL, Study Tour, Gathering dll)</option>
                                    <option>Wisata Reliji (Ziarah)</option>
                                    <option>Bisnis Trip</option>
                                    <option>Outdoor Study (KKL, Study Tour, Gathering dll)</option>
                                    <option>Lainnya</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Nama Pemesan</label><span class="text-danger">*</span>
                                <input
                                    type="text"
                                    id="nama"
                                    class="form-control"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6"
                                    required />
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">No Telepon</label><span class="text-danger">*</span>
                                <input
                                    type="text"
                                    id="phone"
                                    class="form-control"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6"
                                    required />
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Jumlah Penumpang</label><span class="text-danger">*</span>
                                <input
                                    type="number"
                                    id="pax"
                                    class="form-control"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6"
                                    required />
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Instansi Anda</label><span class="text-danger">*</span>
                                <select
                                    id="instansi"
                                    class="form-select"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6">
                                    <option>-Pilih-</option>
                                    <option>Customer Makara</option>
                                    <option>Biro Wisata</option>
                                    <option>Instansi Resmi (Akademi, Goverment dll)</option>
                                    <option>Corporate Program</option>
                                    <option>Lainnya</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tujuan</label><span class="text-danger">*</span>
                                <input
                                    type="text"
                                    id="tujuan"
                                    class="form-control"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6"
                                    required />
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Lokasi Jemput</label><span class="text-danger">*</span>
                                <input
                                    type="text"
                                    id="lokasi_jemput"
                                    class="form-control"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6"
                                    required />
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tanggal</label><span class="text-danger">*</span>
                                <input
                                    type="date"
                                    id="tanggal"
                                    class="form-control"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6"
                                    required />
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Catatan Tambahan</label>
                                <textarea
                                    id="note"
                                    class="form-control"
                                    rows="3"
                                    style="background: #0f1115; border: 1px solid #2a2f36; color: #e6e6e6"></textarea>
                            </div>

                            <button type="submit" id="submitBtn" class="btn btn-outline-light px-5 py-3 fw-bold">
                                <span id="btnText">Kirim</span>
                                <span id="btnLoading" style="display: none">⏳ Mengirim...</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <div id="footer"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
        <script src="js/script.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const form = document.getElementById("bookingForms");
                const btn = document.getElementById("submitBtn");
                const btnText = document.getElementById("btnText");
                const btnLoading = document.getElementById("btnLoading");

                form.addEventListener("submit", function (e) {
                    e.preventDefault();

                    // ===== START LOADING =====
                    btn.disabled = true;
                    btnText.style.display = "none";
                    btnLoading.style.display = "inline";

                    const nama = document.getElementById("nama").value.trim();
                    const phone = document.getElementById("phone").value.trim();
                    const tanggal = document.getElementById("tanggal").value;
                    const armada = document.getElementById("armada").value;
                    const tujuan = document.getElementById("tujuan").value;
                    const pax = document.getElementById("pax").value;
                    const note = document.getElementById("note").value;
                    const jenis_perjalanan = document.getElementById("jenis_perjalanan").value;
                    const instansi = document.getElementById("instansi").value;
                    const lokasi_jemput = document.getElementById("lokasi_jemput").value;

                    const pesan = `
                    *BOOKING ARMADA BARU*

                    Nama : ${nama}
                    No HP : ${phone}
                    Jenis Perjalanan : ${jenis_perjalanan}
                    Instansi : ${instansi}
                    Tanggal : ${tanggal}
                    Armada : ${armada}
                    Lokasi Jemput : ${lokasi_jemput}
                    Tujuan : ${tujuan}
                    Jumlah Pax : ${pax}

                    Catatan : ${note || "-"}

                    Mohon info ketersediaan armada
                            `;

                    const encodedMessage = encodeURIComponent(pesan);

                    window.open(`https://wa.me/6281277774005?text=${encodedMessage}`, "_blank");

                    form.reset();

                    // ===== STOP LOADING =====
                    btn.disabled = false;
                    btnText.style.display = "inline";
                    btnLoading.style.display = "none";
                });
            });
        </script>
    </body>
</html>
